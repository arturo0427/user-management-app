<section class="min-h-screen bg-slate-50 p-6">
  <div class="mx-auto max-w-3xl space-y-6">
    <a
      routerLink="/"
      class="inline-flex items-center text-sm text-slate-600 hover:underline cursor-pointer"
    >
      ← Volver
    </a>

    @if (user()) {
      <div class="rounded-xl bg-white p-6 shadow-sm space-y-4">
        <h1 class="text-2xl font-bold text-slate-900">
          {{ user()?.name }}
        </h1>

        <div class="space-y-2 text-sm text-slate-700">
          <p><strong>Email:</strong> {{ user()?.email }}</p>
          <p><strong>Empresa:</strong> {{ user()?.company?.name || 'Sin empresa' }}</p>
          <p><strong>Fecha de nacimiento:</strong> {{ user()?.birthDate || 'No disponible' }}</p>
          <p><strong>Edad:</strong> {{ user()?.age ?? 'No disponible' }}</p>
        </div>
      </div>
    } @else {
      <div class="rounded-xl bg-white p-6 text-center shadow-sm">
        <p class="text-sm text-red-600">Usuario no encontrado.</p>
      </div>
    }
  </div>
</section>
