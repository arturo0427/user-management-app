<div class="flex flex-col gap-1">
  @if (label()) {
    <label [for]="id()" class="text-sm font-medium text-slate-700">
      {{ label() }}
    </label>
  }

  <input
    [id]="id()"
    [type]="type()"
    [value]="value()"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    (input)="onInput($event)"
    class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-200 disabled:cursor-not-allowed disabled:bg-slate-100"
  />

  @if (errorMessage()) {
    <span class="text-sm text-red-600">
      {{ errorMessage() }}
    </span>
  }
</div>
